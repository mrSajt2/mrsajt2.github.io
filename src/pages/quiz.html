<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FutazAI - Kérdőív</title>

  <link rel="stylesheet" href="/index.css" />
</head>

<body>

    <div class="quiz">
      <h1>FutazAI</h1>
    
      <!-- KÉRDÉS -->
      <div id="question-box">
    
        <h2 id="question-text"></h2>
    
        <div id="input-box"></div>
    
      </div>
    
      <!-- TOVÁBB GOMB -->
      <button id="next-btn" disabled>Következő</button>
    
    </div>
    
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, reload, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCw0MWDxCK0dgWarSQCFzCGa06Sv7LR4xY",
  authDomain: "futazai-20776.firebaseapp.com",
  projectId: "futazai-20776",
  storageBucket: "futazai-20776.firebasestorage.app",
  messagingSenderId: "123367613667",
  appId: "1:123367613667:web:3e8fec1b68983be8aa11d6",
  measurementId: "G-QWLHPP2FDC"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const quizStorageKey = "futazai-quiz-state";
        
        const flow = {
  start: "q1",

  q1: {
    text: "Mi a fő célod?",
    type: "buttons",
    options: {
      "Fogyás / Fittebb életmód": "q2a",
      "Versenyre készülés": "q2b"
    }
  },

  q2a: {
    text: "Mennyit futsz mostanában hetente?(km)",
    type: "number",
    min: 1,
    max: 500,
    step: 1,
    next: "q3a"
  },

  q2b: {
    text: "Melyik táv?",
    type: "buttons-with-input",
    inputTrigger: "Több",
    inputKey: "customDistance",
    inputPlaceholder: "Add meg a távot km-ben...",
    inputMin: 43,
    inputMax: 1000,
    inputStep: 1,
    options: {
        "5k": "q3a",
        "10k": "q3a",
        "21k": "q3a",
        "42k": "q3a",
        "Több": "q3a"
    }
  },

  q3a: {
    text: "Életkor?",
    type: "number",
    min: 12,
    max: 100,
    step: 1,
    next: "q3b"
  },

  q3b: {
    text: "Testsúly?(kg)",
    type: "number",
    min: 25,
    max: 300,
    step: 1,
    next: "q3c"
  },

  q3c: {
    text: "Magasság?(cm)",
    type: "number",
    min: 100,
    max: 250,
    step: 1,
    next: "q3d"
  },

  q3d: {
    text: "Van e valamilyen sérülésed?",
    type: "inline-input",
    next: "q4"
},


  q4: {
    text: "Órával mérsz vagy telefonnal?",
    type: "buttons",
    options: {
      "Óra": "q5",
      "Telefon": "q5"
    }
  },

  q5: {
    text: "Heti hány nap fér bele?",
    type: "buttons",
    options: {
        "1": "q6",
        "2": "q6",
        "3": "q6",
        "4": "q6",
        "5": "q6",
        "6": "q6",
        "7": "q6"
    }
  },

  q6: {
    text: "Mehet heti 1 erősítés is?",
    type: "buttons",
    options: {
      "Igen": "q7",
      "Nem": "q7"
    }
  },

  q7: {
    text: "Kapcsolattartási adatok",
    type: "contact-info",
    next: "q8"
  },

  q8: {
    text: "Email megerősítése",
    type: "email-verification",
    next: "q9"
  },

  q9: {
    text: "Adatkezelési hozzájárulás",
    type: "consent",
    next: "end"
  }
};
        let current = flow.start;
        const answers = {};
        const verificationState = {
          email: "",
          user: null,
          sent: false,
          sending: false,
          checking: false
        };
        
        const questionText = document.getElementById("question-text");
        const inputBox = document.getElementById("input-box");
        const nextBtn = document.getElementById("next-btn");
        const consentVersion = "privacy-v1";

        function persistQuizState() {
          sessionStorage.setItem(
            quizStorageKey,
            JSON.stringify({
              current,
              answers,
              verificationState: {
                email: verificationState.email,
                sent: verificationState.sent
              }
            })
          );
        }

        function restoreQuizState() {
          const savedState = sessionStorage.getItem(quizStorageKey);

          if (!savedState) {
            return;
          }

          try {
            const parsedState = JSON.parse(savedState);

            if (parsedState.answers && typeof parsedState.answers === "object") {
              Object.assign(answers, parsedState.answers);
            }

            if (parsedState.current && flow[parsedState.current]) {
              current = parsedState.current;
            }

            if (parsedState.verificationState) {
              verificationState.email = parsedState.verificationState.email || "";
              verificationState.sent = Boolean(parsedState.verificationState.sent);
            }
          } catch (error) {
            sessionStorage.removeItem(quizStorageKey);
          }
        }

        function isValidEmail(email) {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function isNumberInRange(value, config = {}) {
          if (value === null || value === undefined || value === "") {
            return false;
          }

          const numericValue = Number(value);

          if (!Number.isFinite(numericValue)) {
            return false;
          }

          if (config.min !== undefined && numericValue < config.min) {
            return false;
          }

          if (config.max !== undefined && numericValue > config.max) {
            return false;
          }

          return true;
        }

        function generateTempPassword() {
          const randomPart = crypto.getRandomValues(new Uint32Array(2)).join("");
          return `FutazAI!${randomPart}Aa1`;
        }

        function setEmailVerificationResult(isVerified) {
          answers.emailVerified = isVerified;
          answers[current] = isVerified ? "Ellenőrizve" : "";

          if (isVerified) {
            answers.emailVerifiedAt = new Date().toISOString();
          } else {
            answers.emailVerifiedAt = null;
          }

          persistQuizState();
        }

        async function ensureVerificationUser() {
          const email = answers.contactEmail;

          if (!email || !isValidEmail(email)) {
            throw new Error("Adj meg egy érvényes email címet az ellenőrzéshez.");
          }

          if (verificationState.user && verificationState.email === email) {
            return verificationState.user;
          }

          verificationState.email = email;

          try {
            const credential = await createUserWithEmailAndPassword(auth, email, generateTempPassword());
            verificationState.user = credential.user;
            answers.authUid = credential.user.uid;
            persistQuizState();
            return credential.user;
          } catch (error) {
            if (error.code === "auth/email-already-in-use") {
              throw new Error("Ez az email cím már használatban van. Kérlek használj másik email címet az ellenőrzéshez.");
            }

            throw error;
          }
        }

        async function sendVerificationEmail() {
          verificationState.sending = true;

          try {
            const user = await ensureVerificationUser();
            await sendEmailVerification(user);
            verificationState.sent = true;
            answers.emailVerificationSentAt = new Date().toISOString();
            persistQuizState();
            return {
              ok: true,
              message: `Megerősítő email elküldve erre a címre: ${answers.contactEmail}`
            };
          } catch (error) {
            return {
              ok: false,
              message: error.message || "Nem sikerült elküldeni a megerősítő emailt."
            };
          } finally {
            verificationState.sending = false;
          }
        }

        async function checkEmailVerification() {
          verificationState.checking = true;

          try {
            const user = verificationState.user || auth.currentUser;

            if (!user) {
              throw new Error("Először küldd el a megerősítő emailt.");
            }

            await reload(user);
            const verifiedUser = auth.currentUser || user;
            const isVerified = Boolean(verifiedUser.emailVerified);

            setEmailVerificationResult(isVerified);

            if (isVerified) {
              return {
                ok: true,
                verified: true,
                message: "Az email cím sikeresen meg lett erősítve."
              };
            }

            return {
              ok: true,
              verified: false,
              message: "Az email még nincs megerősítve. Nyisd meg az emailedben kapott linket, majd kattints újra az ellenőrzésre."
            };
          } catch (error) {
            return {
              ok: false,
              verified: false,
              message: error.message || "Nem sikerült ellenőrizni az email megerősítését."
            };
          } finally {
            verificationState.checking = false;
          }
        }
        
        async function finishQuiz() {
          await addDoc(collection(db, "users"), {
            answers,
            consent: {
              accepted: true,
              acceptedAt: new Date().toISOString(),
              version: consentVersion,
              scope: "Személyre szabott edzésterv készítése, beleértve az esetlegesen megadott egészségügyi adatokat is."
            }
          });

          sessionStorage.removeItem(quizStorageKey);
          await signOut(auth).catch(() => {});
          window.location.href = "./waiting.html";
        }

        function render() {
          const q = flow[current];
          persistQuizState();
          questionText.textContent = q.text;
          inputBox.innerHTML = "";
          nextBtn.disabled = true;
          nextBtn.style.display = "inline-block";

          if (q.type === "buttons") {
            const wrapper = document.createElement("div");
            wrapper.className = "button-group";

            Object.keys(q.options).forEach(opt => {
              const btn = document.createElement("button");
              btn.textContent = opt;
              btn.className = "choice-btn";

              btn.onclick = () => {
                answers[current] = opt;
                btn.classList.add("active");

                setTimeout(async () => {
                  const next = q.options[opt];

                  if (next === "end") {
                    await finishQuiz();
                    return;
                  }

                  current = next;
                  persistQuizState();
                  render();
                }, 200);
              };

              wrapper.appendChild(btn);
            });

            inputBox.appendChild(wrapper);
            nextBtn.style.display = "none";
            return;
          }

          if (q.type === "inline-input") {
            const wrapper = document.createElement("div");
            wrapper.className = "button-group";

            const yesBtn = document.createElement("button");
            yesBtn.textContent = "Igen";
            yesBtn.className = "choice-btn";

            const noBtn = document.createElement("button");
            noBtn.textContent = "Nem";
            noBtn.className = "choice-btn";

            wrapper.appendChild(yesBtn);
            wrapper.appendChild(noBtn);
            inputBox.appendChild(wrapper);

            const detailInput = document.createElement("input");
            detailInput.type = "text";
            detailInput.placeholder = "Írd le a sérülést...";
            detailInput.style.display = "none";
            detailInput.style.marginTop = "15px";
            inputBox.appendChild(detailInput);

            function setActive(activeBtn) {
              [yesBtn, noBtn].forEach(btn => btn.classList.remove("active"));
              activeBtn.classList.add("active");
            }

            yesBtn.onclick = () => {
              setActive(yesBtn);
              answers[current] = "Igen";
              persistQuizState();

              detailInput.style.display = "block";
              detailInput.value = answers.injuryDetail || "";
              detailInput.focus();

              nextBtn.disabled = !detailInput.value.trim();
            };

            noBtn.onclick = () => {
              setActive(noBtn);
              answers[current] = "Nem";
              answers.injuryDetail = null;
              persistQuizState();

              detailInput.style.display = "none";
              detailInput.value = "";
              nextBtn.disabled = false;
            };

            detailInput.addEventListener("input", () => {
              answers.injuryDetail = detailInput.value.trim();
              nextBtn.disabled = !answers.injuryDetail;
              persistQuizState();
            });

            return;
          }

          if (q.type === "buttons-with-input") {
            const wrapper = document.createElement("div");
            wrapper.className = "button-group";

            const detailInput = document.createElement("input");
            detailInput.type = "number";
            detailInput.placeholder = q.inputPlaceholder;
            detailInput.min = String(q.inputMin);
            detailInput.max = String(q.inputMax);
            detailInput.step = String(q.inputStep || 1);
            detailInput.style.display = "none";
            detailInput.style.marginTop = "15px";
            detailInput.value = answers[q.inputKey] || "";

            const updateState = () => {
              const selected = answers[current];
              const needsInput = selected === q.inputTrigger;
              const detailValue = detailInput.value.trim();

              detailInput.style.display = needsInput ? "block" : "none";

              if (!needsInput) {
                answers[q.inputKey] = null;
                nextBtn.disabled = !selected;
              } else {
                answers[q.inputKey] = detailValue;
                nextBtn.disabled = !isNumberInRange(detailValue, {
                  min: q.inputMin,
                  max: q.inputMax
                });
              }

              persistQuizState();
            };

            Object.keys(q.options).forEach((opt) => {
              const btn = document.createElement("button");
              btn.textContent = opt;
              btn.className = "choice-btn";

              if (answers[current] === opt) {
                btn.classList.add("active");
              }

              btn.onclick = () => {
                answers[current] = opt;

                Array.from(wrapper.querySelectorAll(".choice-btn")).forEach((choiceBtn) => {
                  choiceBtn.classList.remove("active");
                });

                btn.classList.add("active");
                updateState();

                if (opt === q.inputTrigger) {
                  detailInput.focus();
                } else {
                  setTimeout(async () => {
                    const next = q.options[opt];

                    if (next === "end") {
                      await finishQuiz();
                      return;
                    }

                    current = next;
                    persistQuizState();
                    render();
                  }, 200);
                }
              };

              wrapper.appendChild(btn);
            });

            detailInput.addEventListener("input", () => {
              updateState();
            });

            inputBox.appendChild(wrapper);
            inputBox.appendChild(detailInput);
            nextBtn.textContent = "Következő";
            updateState();
            return;
          }

          if (q.type === "consent") {
            const card = document.createElement("div");
            card.className = "consent-card";

            const intro = document.createElement("p");
            intro.className = "consent-copy";
            intro.textContent = "A kérdőív elküldéséhez el kell fogadnod az adatkezelési tájékoztatót, és hozzá kell járulnod az adataid kezeléséhez a személyre szabott edzésterv elkészítése céljából.";

            const link = document.createElement("a");
            link.className = "consent-link";
            link.href = "../privacy-policy.html";
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.textContent = "Adatkezelési tájékoztató megnyitása";

            const label = document.createElement("label");
            label.className = "consent-option";

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.checked = Boolean(answers.privacyConsent);

            const labelText = document.createElement("span");
            labelText.textContent = "Elfogadom az adatkezelési tájékoztatót, és hozzájárulok ahhoz, hogy a FutazAI a megadott adataimat a személyre szabott edzésterv elkészítése céljából kezelje.";

            label.appendChild(checkbox);
            label.appendChild(labelText);

            const note = document.createElement("p");
            note.className = "consent-note";
            note.textContent = "A hozzájárulás bármikor visszavonható a kapcsolatfelvételi csatornáidon keresztül.";

            checkbox.addEventListener("change", () => {
              answers[current] = checkbox.checked ? "Elfogadva" : "";
              answers.privacyConsent = checkbox.checked;
              nextBtn.disabled = !checkbox.checked;
              persistQuizState();
            });

            nextBtn.textContent = "Küldés";
            nextBtn.disabled = !checkbox.checked;

            card.appendChild(intro);
            card.appendChild(link);
            card.appendChild(label);
            card.appendChild(note);
            inputBox.appendChild(card);
            return;
          }

          if (q.type === "email-verification") {
            const card = document.createElement("div");
            card.className = "verification-card";

            const intro = document.createElement("p");
            intro.className = "verification-copy";
            intro.textContent = `Az email címed megerősítéséhez küldünk egy linket erre a címre: ${answers.contactEmail}`;

            const note = document.createElement("p");
            note.className = "verification-note";
            note.textContent = "Nyisd meg az emailedben kapott linket, utána gyere vissza ide, és ellenőrizd az állapotot.";

            const status = document.createElement("p");
            status.className = "verification-status";

            const actions = document.createElement("div");
            actions.className = "button-group verification-actions";

            const resendBtn = document.createElement("button");
            resendBtn.type = "button";
            resendBtn.className = "choice-btn";
            resendBtn.textContent = verificationState.sent ? "Email újraküldése" : "Email elküldése";

            const checkBtn = document.createElement("button");
            checkBtn.type = "button";
            checkBtn.className = "choice-btn";
            checkBtn.textContent = "Már megerősítettem";

            const setStatus = (message, isError = false) => {
              status.textContent = message;
              status.className = isError ? "verification-status error" : "verification-status";
            };

            const syncState = () => {
              answers[current] = answers.emailVerified ? "Ellenőrizve" : "";
              nextBtn.disabled = !answers.emailVerified;
              resendBtn.disabled = verificationState.sending;
              checkBtn.disabled = verificationState.checking;
              resendBtn.textContent = verificationState.sent ? "Email újraküldése" : "Email elküldése";
              persistQuizState();
            };

            resendBtn.addEventListener("click", async () => {
              syncState();
              setStatus("Megerősítő email küldése folyamatban...");

              const result = await sendVerificationEmail();
              setStatus(result.message, !result.ok);
              syncState();
            });

            checkBtn.addEventListener("click", async () => {
              syncState();
              setStatus("Ellenőrzés folyamatban...");

              const result = await checkEmailVerification();
              setStatus(result.message, !result.ok);
              syncState();
            });

            card.appendChild(intro);
            card.appendChild(note);
            actions.appendChild(resendBtn);
            actions.appendChild(checkBtn);
            card.appendChild(actions);
            card.appendChild(status);
            inputBox.appendChild(card);

            if (answers.emailVerified) {
              setStatus("Az email címed már meg van erősítve.");
            } else if (verificationState.sent) {
              setStatus(`A megerősítő email már el lett küldve erre a címre: ${answers.contactEmail}`);
            } else {
              setStatus("Megerősítő email küldése folyamatban...");
              void sendVerificationEmail().then((result) => {
                setStatus(result.message, !result.ok);
                syncState();
              });
            }

            nextBtn.textContent = "Következő";
            syncState();
            return;
          }

          if (q.type === "contact-info") {
            const wrapper = document.createElement("div");
            wrapper.className = "contact-fields";

            const nameInput = document.createElement("input");
            nameInput.type = "text";
            nameInput.placeholder = "Teljes név";
            nameInput.autocomplete = "name";
            nameInput.value = answers.contactName || "";

            const emailInput = document.createElement("input");
            emailInput.type = "email";
            emailInput.placeholder = "Email cím";
            emailInput.autocomplete = "email";
            emailInput.inputMode = "email";
            emailInput.value = answers.contactEmail || "";

            const phoneInput = document.createElement("input");
            phoneInput.type = "tel";
            phoneInput.placeholder = "Telefonszám (opcionális)";
            phoneInput.autocomplete = "tel";
            phoneInput.inputMode = "tel";
            phoneInput.maxLength = 30;
            phoneInput.value = answers.contactPhone || "";

            const helper = document.createElement("p");
            helper.className = "contact-helper";
            helper.textContent = "A név és az email cím kötelező. Telefonszámot csak akkor adj meg, ha szeretnéd.";

            const updateContactState = () => {
              answers.contactName = nameInput.value.trim();
              answers.contactEmail = emailInput.value.trim();
              answers.contactPhone = phoneInput.value.trim();
              answers.emailVerified = false;
              answers.emailVerificationSentAt = null;
              setEmailVerificationResult(false);
              verificationState.email = "";
              verificationState.user = null;
              verificationState.sent = false;
              answers[current] = answers.contactName && isValidEmail(answers.contactEmail) ? "Kitöltve" : "";
              nextBtn.disabled = !answers[current];
              persistQuizState();
            };

            [nameInput, emailInput, phoneInput].forEach((field) => {
              field.addEventListener("input", updateContactState);
              wrapper.appendChild(field);
            });

            inputBox.appendChild(wrapper);
            inputBox.appendChild(helper);
            nextBtn.textContent = "Következő";
            updateContactState();
            return;
          }

          let input;
          nextBtn.textContent = "Következő";

          if (q.type === "select") {
            input = document.createElement("select");
            input.innerHTML =
              `<option value="">Válassz...</option>` +
              Object.keys(q.options)
                .map(opt => `<option value="${opt}">${opt}</option>`)
                .join("");

            input.addEventListener("change", () => {
              answers[current] = input.value;
              nextBtn.disabled = !input.value;
            });
          } else {
            input = document.createElement("input");
            input.type = q.type;
            if (q.type === "number") {
              if (q.min !== undefined) {
                input.min = String(q.min);
              }
              if (q.max !== undefined) {
                input.max = String(q.max);
              }
              input.step = String(q.step || 1);
              input.inputMode = "numeric";
            }

            input.addEventListener("input", () => {
              const value = input.value.trim();
              answers[current] = value;
              nextBtn.disabled = q.type === "number"
                ? !isNumberInRange(value, q)
                : !answers[current];
              persistQuizState();
            });
          }

          inputBox.appendChild(input);
        }
        
        nextBtn.onclick = async () => {
          const q = flow[current];
          const answer = answers[current];

          if (!answer) {
            return;
          }

          if (q.type === "consent" && !answers.privacyConsent) {
            return;
          }

          if (q.type === "inline-input" && answer === "Igen" && !answers.injuryDetail) {
            return;
          }

          if (q.type === "buttons-with-input" && answer === q.inputTrigger && !answers[q.inputKey]) {
            return;
          }

          if (q.type === "buttons-with-input" && answer === q.inputTrigger && !isNumberInRange(answers[q.inputKey], {
            min: q.inputMin,
            max: q.inputMax
          })) {
            return;
          }

          if (q.type === "number" && !isNumberInRange(answer, q)) {
            return;
          }

          if (q.type === "email-verification" && !answers.emailVerified) {
            return;
          }

          const next = q.options ? q.options[answer] : q.next;

          if (!next) {
            console.log("Nincs next:", current, answer);
            return;
          }

          if (next === "end") {
            await finishQuiz();
            return;
          }

          current = next;
          persistQuizState();
          render();
        };

        restoreQuizState();
        render();
        </script>
    
    </body>
    </html>
