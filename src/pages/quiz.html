<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FutazAI - Kérdőív</title>

  <link rel="stylesheet" href="https://mrsajt2.github.io/FutazAI/index.css" />
</head>

<body>

    <div class="quiz">
    
      <h1>FutazAI onboarding</h1>
    
      <!-- KÉRDÉS -->
      <div id="question-box">
    
        <h2 id="question-text"></h2>
    
        <div id="input-box"></div>
    
      </div>
    
      <!-- TOVÁBB GOMB -->
      <button id="next-btn" disabled>Következő</button>
    
    </div>
    
    <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCw0MWDxCK0dgWarSQCFzCGa06Sv7LR4xY",
  authDomain: "futazai-20776.firebaseapp.com",
  projectId: "futazai-20776",
  storageBucket: "futazai-20776.firebasestorage.app",
  messagingSenderId: "123367613667",
  appId: "1:123367613667:web:3e8fec1b68983be8aa11d6",
  measurementId: "G-QWLHPP2FDC"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
        
        const flow = {
  start: "q1",

  q1: {
    text: "Mi a fő célod?",
    type: "buttons",
    options: {
      "Fogyás / Fittebb életmód": "q2a",
      "Versenyre készülés": "q2b"
    }
  },

  q2a: {
    text: "Mennyit futsz mostanában(km)? Mi esik jól?",
    type: "text",
    next: "q3"
  },

  q2b: {
    text: "Melyik táv?",
    type: "buttons",
    options: {
        "5k": "q3a",
        "10k": "q3a",
        "21k": "q3a",
        "42k": "q3a",
        "Több": "q2c"
    }
  },

  q2c: {
    text: "Mekkora távról van szó pontosan?(km)",
    type: "number",
    next: "q3a"
  },

  q3a: {
    text: "Életkor?",
    type: "number",
    next: "q3b"
  },

  q3b: {
    text: "Testsúly?",
    type: "number",
    next: "q3c"
  },

  q3c: {
    text: "Magasság?",
    type: "number",
    next: "q3d"
  },

  q3d: {
    text: "Van e valamilyen sérülésed?",
    type: "buttons",
    options: {
      "Igen": "q3e",
      "Nem": "q4"
    }
  },

  q3e: {
    text: "Milyen sérülésed van?",
    type: "text",
    next: "q4"
  },

  q4: {
    text: "Órával mérsz vagy telefonnal?",
    type: "buttons",
    options: {
      "Óra": "q5",
      "Telefon": "q5"
    }
  },

  q5: {
    text: "Heti hány nap fér bele?",
    type: "buttons",
    options: {
        "1": "q6",
        "2": "q6",
        "3": "q6",
        "4": "q6",
        "5": "q6",
        "6": "q6",
        "7": "q6"
    }
  },

  q6: {
    text: "Mehet heti 1 erősítés is?",
    type: "buttons",
    options: {
      "Igen": "end",
      "Nem": "end"
    }
  }
};
        let current = flow.start;
        const answers = {};
        
        const questionText = document.getElementById("question-text");
        const inputBox = document.getElementById("input-box");
        const nextBtn = document.getElementById("next-btn");
        
        function render() {
          const q = flow[current];
          questionText.textContent = q.text;
          inputBox.innerHTML = "";
          nextBtn.disabled = true;
          nextBtn.style.display = "inline-block";
          let input;
        
          if (q.type === "buttons") {
  const wrapper = document.createElement("div");
  wrapper.className = "button-group";

  Object.keys(q.options).forEach(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.className = "choice-btn";

    btn.onclick = async () => {
      answers[current] = opt;

      // kis vizuális feedback
      btn.classList.add("active");

      // rövid delay (Apple feel)
      setTimeout(async () => {
        const next = q.options[opt];

        if (next === "end") {
          await addDoc(collection(db, "users"), {
            answers
          });

          alert("Készen is vagyunk!!");
          console.log(answers);
          return;
        }

        current = next;
        render();
      }, 200); // 0.2s delay
    };

    wrapper.appendChild(btn);
  });

  inputBox.appendChild(wrapper);

  // ELREJTJÜK A NEXT GOMBOT
  nextBtn.style.display = "none";

          } else {
            input = document.createElement("input");
            input.type = q.type;
          }
        
          input.addEventListener("input", () => {
            answers[current] = input.value;
            nextBtn.disabled = !input.value;
          });
        
          inputBox.appendChild(input);
        
          nextBtn.onclick = async () => {
            const answer = answers[current];
            const next = q.type === "select"
              ? q.options[answer]
              : q.next;
        
            if (next === "end") {
                await addDoc(collection(db, "users"), {
                    answers: answers
                });
                alert("További információkkal hamarosan jelentkezünk!");
              return;
            }
        
            current = next;
            render();
          };
        }
        
        render();
        </script>
    
    </body>
    </html>
